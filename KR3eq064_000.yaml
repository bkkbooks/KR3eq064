body:
  text: 願體醫話良方人之嗜好各有不同余每遇裝金塑像心知好事而踴躍不前見疾病之人則周旋圖救而富厚者雖得沉疴不甚關切遇貧寒者縱系微疾儼如身受蓋富厚者延醫有資購藥有力主病有人驅使有僕何難拯救至若貧人以身覓食一朝染病不但醫藥無資甚且饘粥莫繼病愈沉重心愈焦勞往往延挨莫救興言及此為之墮淚但恨力薄不能施濟聊繼前志延醫診脈送方揚城施藥不乏其人然或詩書子弟素封后人一時落魄而故舊滿目體面猶存不肯入藥局當施捨二字隱忍而不赴局者有之余設法體貼使雅俗咸宜常署其門曰人之最苦無如疾病呻吟痛楚非藥莫愈夫病不患無良藥而患無良方每見藥餌誤投反增其病愚久懷送藥之心因無送藥之力數年以來自五月起至九月止延請名醫分暇半日診病切脈內外大小對證立方奉送但諸公就視非為省其醫資庶可免於錯誤如肯惠然而來每日午前接教將此刊刷偏貼通衢又慮真正貧人得方不能措藥乃制丸散膏藥數種再察其衣不蔽體而帶飢容多寡量助惟恨不能親為吮疽煮藥耳家人哂余婆心過切不憚勞苦余曰不然人無貴賤同歸土吾非斯人之徒之而誰與如丁巳年間揚境瘟疫甚行一時當事以及好義者多捐資施藥余因慨嘆就醫者皆兩城附近之人其窮鄉僻壤何能遠涉縱或父兄子弟代為取討無論未經切脈不無有誤且有並無親人之鰥寡孤獨以及舉室染病之家湯水無人接遞況遠來求藥乎近日風俗日澆每遇時疫輒慮傳染雖骨肉亦有視如陌路者余聞之憤激邀醫同行令僕從肩藥並帶藥引等類每至一村幾無煙火推柴扉虛掩守犬空鳴召人診視方扶攜而至皆蓬頭垢面蹙額呻吟全家病者即就臥榻切脈撮藥各置枕下以錢呼鄰煩其煎服日涉數十里然余固無恙也有相愛者謂余太輕身余因曰嗜好不同吾亦行吾之所好耳雖然天下不無同此志者幸勿惑於傳染之妄言而廢其初心即以余驗之可知其妄矣俞桂庭曰天下第一好事莫如救人之命醫者存心濟世即為救命之人救窮人一命功勝救宮人十倍蓋富者原是養尊處優之體而窮人趁工度日病一日則少一日柴米之資焉能有餘錢以延醫服藥乎故誤藥以殺窮人其罪亦浮於誤藥以殺富人富人雖死其家尚溫飽也窮人死後必致父母無養妻兒離散醫者不察往往視貧病而疏忽見富貴而慎重殊不知貧病尤須慎重也措臣先生之話真藹然仁者之言切中時弊之論惟望有力者仿其夏秋設局如遇時疫流行之歲齎藥赴鄉沿門施診更望為醫者實心詳慎出心與出力陰德相侔吾鄉向有常年施診之局而延請名醫務宜祟實勿圖修俸之廉勿尚虛名之輩當求實有學識而敦品行者庶不虛其利濟之功若當道者能身先倡率廣為勤募妥立章程行諸遐邇仁民之政端在斯歟一病有一藥可治一證有一方可療常見有病者而難遇其方有方者而不遇其病余謂天下奇方頗多經驗者縱有濟世之心焉能逢人說項吾意擇一廟字書其門曰施藥不如施方凡有效驗藥方勸其抄寫明白實貼廟內使有方者得以利濟而有病者可免沉疴久而秘方彙集人人皆知某處有方對證檢用未必非恤人疾痛之一端耳此謬竭一得之愚不過休慼相關之念儻有同心設法舉行亦惠而不費之事也俞佳庭曰搢臣濟世之心可謂無微不至矣如此求方其法甚妥而最可鄙者得一良方秘而不露忍使靈丹湮沒坐看奇病危亡昧理喪心無逾此極更有藉此謀利需索重酬市井之徒固不足怪號為儒者亦爾效尤富病尚可求生貧病使之待斃撫心自問罪可逃乎宜鑑斯言亟為造福紀文達公云南皮瘍醫某藝頗精然好陰用毒藥勤索重資不饜所欲則必死蓋其術詭秘他醫不能解也一日其子雷震死今某尚在亦無敢延之者矣或謂某殺人至多天何不殛其身而殛其子有佚罰焉夫罪不至極刑不及孥惡不至極殃不及世殛其子所以明禍延後嗣也又云歙人蔣紫垣善解砒毒因秘其方以索重價致遭冥譴皆可為醫鑑也嘗聞有是病即有是藥但些小之恙自可藥到病除一遇疑難之證認為寒者投熱而不應認為熱者投寒而不應認為虛者投補而不應認為實者投瀉而不應雖廣延諸醫而主見各異此際吉凶反掌令人茫無適從萬不得已惟有不服藥一著聽其自然看其動靜再為斟酌然又孰肯坐視不救而竟委之大數哉勢必朝秦暮楚遇藥則投直至氣絕入亡而後已興言及此不勝扼腕有飾其詞曰古人渾樸其疾顯淺易治今人尖巧病證幻出難圖余曰不然從古及今醫聖醫賢無理不闡無書不備總由後人學識未到審證未真若肯以外貌應酬之工用於內求誦讀之際推尋奧妙研究精微審醫案搜脈理一思百慮感而遂通則鮮有不能取效之證今僭創一議無論內外大小一年之中豈無一二奇證若懷之胸臆則近於秘道不傳若登之棗梨又礙於少難成帙何不於三五知己中每於歲底各出所治奇病現何證服何藥如何療如何愈共成一卷以為醫案每年增廣亦是不朽之舉庶使後人有跡可循而無認識不真之憾其功不在盧扁下也然近日又有一種時弊凡遇疾病危險諸醫會集其中學術平常者不過輕描淡寫而已識見高明者若欲另立意見惟恐招人妒忌萬一不效又慮損名瞻前顧後亦是大同小異了事殊不念上天賦我聰明才智若臨證之際不費一番思索不用一番心血代天宣化救濟蒼生止於此中求富貴顧聲名以他人性命痛癢無關生死聽天清夜思之能無自愧俞桂庭曰王載韓云前醫用藥未效後之接手者多務翻案以求勝之久寒則用熱久熱則用寒久瀉則用補久補則用瀉以為取巧出奇之計然而脈與因故在也苟據脈審因確見前醫識力未到自當改弦易轍以正其誤若不據脈審因而妄生歧論只圖求異於人而網其利竟置病人吉凶於度外其居心不可問矣又按古云不服藥為中醫不遇良醫莫若弗藥蓋醫理深微非上智不能討究以百人習醫無十人成就成就之中無一人精通得一明醫談何容易然事在人為貴乎自立如王甥孟英之銳志於醫也足不出戶者十年手不釋卷者永夜邇年在婺屢起危疴藉有聲名後生可畏余每聞而喜躍所有歷年治驗曾令其須存底稿而措臣先生亦有此話可謂先得我心世之為醫者遵史氏之格言效吾甥之苦志出而問世必可加人一等也一本草雖有別名而取用貴乎通俗若圖務博矜奇令人模糊費解危急之際誤事不淺且書有急救良方簡便奇方之稱皆欲速取其效以救也若反用疑難名色豈不與救急之意相悖乎余謂不獨字義務要淺近而藥品之似是而非者亦當辯別即如象貝類川貝薑黃類鬱金之類難以悉舉更為偽雜如採樹枝充桑寄升樟腦入冰片染松脂以代血竭煉白鹽以亂秋石之類若不察真偽而誤服之豈能療病又如藥引中生薑幾片燈草幾莖之類余意須下分兩為是蓋片有厚薄莖有短長過與不及均難取效再如煎藥宜各藥各銚不可同他人混雜恐彼煎攻伐我煎補益彼煎溫熱我煎清涼豈不大有相反譬如酒壺沖茶雖不醉人難免酒氣又本草蒙詮云醫藥貿易多在市家諺云賣藥者兩眼用藥者一眼服藥者無眼可不慎歟俞桂庭曰陳文恭公云史君飽諳世故曲體人情其言質直而透切智愚易曉余謂惟有大學問故能曲體人情凡是大文章無不智愚易曉顧雨田亦云國家徵賦單曰易知良將用兵法云貴速我濟有工於草書者醫案人或不識所繫尚無重輕至於藥名則藥肆中人豈能盡識草書乎孟浪者約略撮之而貽誤小心者往返詢問而羈延凡我同人書方之字必須清爽庶免他虞酒能傷人好飲者每每視為迂說余觀戰國信陵君得罪於魏亡趙度不能自兔終日飲醇酒近女色以求速殞可見古人籍酒自敝其為傷人可知今人不察終日酕釀夙酒未醒新卮又進漏盡方休午余復集甚至廢寢忘餐腹中惟有糟粕其不為腐腸之藥也幾希俞桂庭曰宋劉元城先生云余初到南方有一高僧教余南方地熱而酒性亦熱今嶺南煙瘴之地更加以酒必大發疾故余過嶺即閤家斷飲雖偏歷水土惡劣他人必死之地余閤家十口皆無恙今北歸十年矣無一患瘴者此其效也蘇文忠亦云器之酒量無敵今不復飲矣按此則酒惟北方或嚴冬之令可略飲以禦寒氣世人誤謂可以闢瘴疫是抱薪救火矣又凡造酒糵者必取諸草汁以和米糵而成其草初出之兩葉尖者屬陽性烈而味辛可以造麴初出之兩葉圓者屬陰性涼而味或酸或苦皆不中也故酒性純陽大冷不冰有助欲火灼真陰昏神明釀濕熱之四大弊又吹劍錄云易惟四卦言酒而皆在險難需需於酒食坎樽酒簋貳困困於酒食未濟有孚於飲酒可見酒乃人生之至險也不可不戒哉焚香品茶稱為韻事余按本草茶性苦寒銷厚味解宿醒有克無補故能化積滯膏粱之輩原宜藉以宣清藜藿之腸曷以當其鋒鏑伐胃傷脾久飲必傷元氣馴至飯食漸減胸腹虛膨積飲停痰漸成錮疾深沉日久無藥可瘳在西北之地以茶療疾因貴重而飲之者甚少惟江浙一帶既為出產人多好之間有不飲者即誚為俗人而大戶女流喜吃碗兒茶汁未飲而渣先啖上行下效僕婦使女不論老幼盡皆酷嗜以致面色如金將潤澤容顏變作焦黃面貌豈非消耗脂膏之朋證乎但人只知酒能困人而不知茶亦能傷人故戒茶之說從來未有余特敢為世告願尊生者知茶之為害薄其味而不過飲俾脾胃不傷未必非保生之一法也俞桂庭曰既稱韻事僅可偶爾為之人人而癖之旦旦而飲之有何韻哉況其為用也專為解渴渴因於火或暑熱之外爍或五志之內爍或膏粱之過度或勞役之火升藉以消煩何妨暫飲苟為耽嗜後悔徒然世間惟財與色最是耗人精氣速人死亡而方士之言曰金銀可點化以濟壽少女可採補以延年既快嗜欲又得長生何憚而不為耶試以情理度之恐無此太便宜事不敢信也不可惑也俞桂庭曰死生有命富貴在天皆不能以人力謀也既富貴矣又欲長生一念之貪方士得以售其術古來惑於爐火者無不傾家惑於採補者無不喪命愚夫接踵可不哀哉呂氏春秋云所謂長生者非能短而續之也畢其數也欲畢其數者惟積德其庶幾乎點化採補皆損德之事其得禍而速死也宜矣獨宿之妙不但老年少壯時亦當如此日間紛擾心神散亂全藉夜間安睡以復元氣若日裡心猿意馬控制不定及至醉飽又復恣情縱欲不自愛惜如泥水一碗何時得清俞桂庭曰此從而卻病保生延壽之第一仙方也此外並無丹藥別求秘訣皆是愚人服金石酷烈之藥必至殞命即坐功服氣往往致疾損目人能清心寡慾無暴怒無過思自然血氣和平卻疾多壽譬如火爐置風中則易滅置靜室則難燼此是定理俞桂庭曰閱微草堂筆記云金石燥烈益以火力亢陽鼓盪血脈僨張故筋力似倍加強壯而消鑠真氣伏禍亦深觀藝花者培以硫黃則冒寒吐蕊然盛開之後其樹必枯蓋鬱熱蒸於下則精華湧於上湧則立槁耳參同契爐鼎鉛汞皆是寓名方士轉相附會貽害無窮而不知神仙惟有丹訣無丹方也觀此則本草經之長生不死云云皆後人附會也人知參能補人不知亦能害人貴介之家平日淫欲事所時有一當病發即疑為虛重投人參大寒大熱伏在內始而以參治病既而用藥治參病可治參難治是兩病也雖有扁鵲莫措其手慎之慎之俞桂庭曰藥之弊莫甚於參富貴之人不死於參者鮮矣史君之話可謂洞見癥結糞清值錢不過以其歲月久耳人多略而不置使每年收貯數壇待澄清之日廣行利濟在受者不慮其假與者不傷其惠亦何憚而不為耶於是在小莊收藏數十壇每年臘月以新易舊取用源源不獨痘門熱證之要藥更救一切服毒以此推廣不費之惠豈止一端今將奉送金汁小引附刻於後願同志者仿而行之引曰金汁一種痘熱證在所必虛服毒垂危尤難猝辦臨時即用重價購求尤恐真偽莫辨難以取效豈不誤事無力之家偏僻之處更難剋期應用不佞曾於小莊埋制數壇願以濟世凡遇貧而難覓者幸為指引以便相贈但為數有限望囑其量證多寡取用庶不致浪擲可惜耳引乃惠而不費之舉非敢博利濟之功也俞桂庭曰史君孳孳為善體貼入微讀其書可想見其為人惜餘生也晚不能負笈從遊然千載之後猶可聞風而興人之善心焉所云不費之惠豈止一端他如膽星亦屬易制冬月醃芥滷亦可壇埋野菊花與木芙蓉之葉年年可採龍眼之核隨時可蓄不費錢而又不費力皆可以治大證諸如此類仁者識之倉卒救人方藥凡友人相傳用之有效者刊之惟恐不速惟願見余書者廣為告布雖客程旅舍亦宜抄而黏壁使人人知有救急之法必有因此而全活者矣傳方者豈無功乎解諸物毒解砒霜毒糞清灌之最妙真綠豆粉淨黃泥各四兩俱細篩生雞子清九個三共一處以浸綠豆冷水和稀服若有黑羊血再合碗許更妙凡服砒之人不可令其睡臥恐毒流四肢難治愈後百日內忌菸酒姜椒煎炒一切辛熱之物方無後患俞桂庭增補南天竹子四兩擂水服之立活如無鮮者用乾子煎湯冷服亦可或以防風一二兩煎湯浸冷灌之雞子一二十個打散入明礬末三錢攪勻灌下即吐出大黃二兩生甘草五錢白礬一兩當歸三兩水煎數碗冷飲之立時大吐或大瀉而生否則毒入於臟而死黑鉛四兩用井水於石上磨出黑汁隨磨隨灌候吐盡方無患解銀銪水毒烏梅煎濃湯服即解俞按銪銀腳也一作釉或作黝性主腐爛皮肉今人每用以去痣點之即落此物入腸胃非比砒藥諸毒之酷烈並無唇齒豁裂七竅流血之外傷可以覈驗系釉著腸胃漸漸腐爛令人如患病狀或半月一月而死仍無傷痕可據洗冤錄中如此說生羊血灌之吐盡即解黃泥水服二碗可解每日用飴糖四兩作小丸不時以真麻油吞下亦可瀉其毒出須患者服過百日外方無慮解鹽滷毒宜先搗肥皂皂角汁和水灌之即吐如吐未盡灌熱豆腐漿少頃即吐如腐形而愈雞蛋一二十個打散入生大黃末五錢攪勻徐徐灌下以利下即愈以下俞增白糖霜多吃即解解河豚毒多服金汁即解或以香油灌之吐出即愈橄欖煎濃湯服以下俞增槐茶煎服解野蕈毒多服金汁即解或以地漿灌之橄欖搗為泥食之以下俞增甘草汁磨紫金錠服附解鴉片毒自鴉片煙之毒流行而於水火刀繩砒滷之外更添一速死之途且近今之煙無地無之其死於此者反較水火砒繩為尤眾也殊不知此物雖毒而向吸其煙者久已與臟腑之氣相習即素不吸此而體氣堅強或服煙尚少毒不甚重者治之得法竟可復甦故凡服煙而死者雖氣絕亦多可救邇來廣東新刻套板洗冤錄內明著救治方法曰輕者心中發躁但用活鴨血或糞汁或醬油或涼水或明礬雄黃研末或肥皂煎湯灌之無弗愈者若服多毒重身冷氣絕似乎已死但肢體柔軟則臟腑經絡之氣仍是流通實在未死速將屍安放陰冷無太陽之地一經日照即不可救撬開牙齒用箸橫在屍口將金汁或涼水頻頻灌之再以冷水在胸前摩擦仍將頭髮解散浸在冷水盆內自然漸活曾目擊救愈數人凡七日之內身不僵硬者切弗棺斂云夫洗冤錄為官中驗用之書非無稽傳說可比倘肯廣為流播實今世活人第一要事試思未死活埋之苦則傳播之心不能已矣雄按身不僵硬切勿棺斂一語凡一切卒死之證皆宜遵此未死而誤斂者豈獨服生煙之人耶噫再按觀洗冤錄救治之法則鴉片煙性之熱毒等於砒鴆故一經日照即不可救而世人謂其性冷豈不妄乎附解鶴頂鴆羽毒糯米煮粥搗爛過量啜之極效解諸物鯁魚刺鯁喉多食橄欖即下橄欖核磨服亦可大蒜一瓣切去大頭鯁左塞右鼻鯁右塞左鼻以下俞增南硼砂一塊含化咽汁象牙屑一錢蜜水調下並治諸刺鯁喉即諸刺入肉者水調敷之立出凡鯁某魚之骨即取某魚生眼珠以腐皮裹之吞下即愈諸骨鯁醋煎草果澤瀉飲之即下沙糖煎威靈仙亦可沙糖和馬屁勃服之亦可竹刺鯁喉老絲瓜饒灰酒服三錢立消以下俞補食干飴糖亦可稻芒著喉頓食飴糖即愈木屑搶喉以鐵斧磨水灌之發繞喉以自己的亂髮燒灰一錢白湯下解吞五金光飲生鴨血杯許再多食炒蠶豆不切炒韭菜其便從大便而下誤吞鐵亦用此方誤吞錢多食鳧茈即化鳧茈即荸薺一名地慄艾蒿一把水五升煎一升頓服便下以下俞增雞骨灰研末三錢沙糖調服羊脛骨燒灰研服二錢地慄汁調下誤吞鐵物剝新炭皮研末調粥三碗食之自下誤吞水銀麻油八兩頓服之或拌飯自能解出救縊死凡自縊之人若繩細痕深者最稱難救又云旦至夜者易救暮到天明音難治須急令人抱住將結解開切勿割斷繩子將屍安放平地令一人坐於頭前腳踏其兩肩揪髮向上不可使頭低下揉其項痕捻園氣管摩按胸腹令一人以膝蓋或手厚裹衣服緊緊塞住穀道婦人並抵其陰戶勿令泄氣若手腳已經僵直須為屈伸摩按再以兩管吹氣入耳內以一人口對縊人之口接其氣研生薑半夏末或皂角末吹鼻中以針尖刺人中穴以艾灸足心湧泉穴男左女右各三壯刺雞冠血滴入口中以安心神男用雌女用雄再以生薑湯化蘇合丸灌之如無蘇合丸以濃薑湯灌之其一切治法必待氣從口出呼吸眼汗方可歇手甦醒後只宜少飲粥湯潤其咽喉不可驟與飯食依次拯救雖身冷者亦可十全二三如有真山羊血二三分研極細酒調灌下立活救刎死自刎之人食管斷可治氣管斷難治蓋人之食管居前氣管居後刎之太深則二管俱斷故必死若只食管斷氣管微硬者猶可救全要知覺早乘其氣未絕額未冷急將其頭扶住用熟針穿線縫於刀口皮內之膜上往回間花縫據方書用桃花散降香末松香末糝治奈一時不能即得倉卒之際延醫莫及急將活雄雞一二雙扯下熱雞皮冷則無用將縫刀口周圍纏護外用軟絹帛並棉花扎之再用女人舊布裹腳周圍纏五六轉勿使泄氣其中自然合而為一令患者仰臥以高枕枕之使刀口不開冬夏避風衣被蓋暖若氣能從口鼻通出進糜粥及參湯接補元氣再請明醫診視待後如何解洗換藥如何收口調治如玉紅膏生肌散總聽醫家酌用方不備載亦不易修合也俞按桃花散用石灰二升大黃四兩切片同炒俟灰呈桃紅色去大黃將灰細篩收貯瓶內過月餘去火氣方可應用此散最能止血為金瘡聖藥價廉功敏極宜制送刎喉者縫口即糝後若日漸潰爛以蔥湯洗去之貼以象皮膏自斂又按凡殺傷不透膜者用烏鰂骨或魚骨為末敷瘡口上血立止即蘇內膜未損者急取蔥白搗爛熱鍋炒熟遍敷傷處冷則再換呈氣絕者猶可救活刎傷能咳一聲音喉未斷也慎勿用膏藥等物只以舊氈帽邊燒灰敷之晚間用茶洗去膿穢自然漸愈救溺死溺死者夏月易救冬月較難撈起時用牛一隻將溺人橫覆牛背之上兩邊使人扶住牽牛徐行腹中之水自然從口中及大小便而出以生薑擦牙即活口噤者撬開橫一箸於牙關使可出水再以竹管吹其兩耳研生薑半夏末吹其鼻中皂角末綿裹納入下部蘇合丸或生薑汁灌入口內若無牛以活人仰臥將溺人橫覆於活人身上令活人微微搖動水亦可出若活人不能為之可用水缸傾側將溺人橫覆缸上輕輕搖動其缸水亦易出或覆釜於地以溺人臍對鍋臍俯臥令人手托其頭水亦可出如在冬月急將濕衣解去一面炒鹽用布包熨臍一面厚鋪被褥取灶內無火草灰多多鋪於被褥之上將溺人覆臥灰面腹下以棉枕墊之仍以草灰厚蓋於渾身然後再加蓋被褥但勿使灰眯於眼內其撬口銜箸吹耳鼻灌藥等治俱照前方治之夏月醒後宜少飲米湯冬月醒後宜少飲溫酒速令生人脫貼身衣服衣之宜暖蓋忌火烘救凍死凡凍死之人切忌熱水火烘急用大鍋炒灰盛布袋內放在心口並熨臍腹之間袋須數個冷即更換灌以溫酒薑湯或用厚棉被將凍人捲住睡臥使二人推來轉去俟血脈和通一身漸溫則活如無被草荐亦可救熱死中暑昏悶途中熱死者不可與冷水吃不可令臥冷地當急移陰處用大蒜搗爛加路上熱土和水去渣灌之再掬路上熱土擁臍作窩令眾人尿於其中使暖氣透臍即活救壓死榨壓跌打從高附下落馬撲車竹木所磕損傷者皆瘀血凝滯其大小便通者輕不通者重可用淡豆豉一合煎湯飲之或用生薑汁同麻油和勻溫服之再將淨土五升蒸熱以舊布重裹分為二包更換熨之不可太熱恐傷皮肉痛止則已若骨節打折脫離搗生蟹極爛用熱酒傾入任量飲之即用蟹渣敷患處如無生蟹干蟹燒灰酒服亦可或用蟾蜍搗如泥縛定其骨自合或用雄雞一隻立刻去毛淨以刀剖腹裝五加皮六兩五臟一毫莫去乘熱速速搗爛敷患處用棉裹暖則血脈流通如此一周時即去敷藥務要切記時辰若遲去則敷處反生多骨而帶疾矣如氣絕沉重取藥不及擘開口以熱尿灌之用半夏末吹鼻以艾灸臍再將患入盤足坐住將發提起使氣從上升則可活矣凡手足肩背壓重打傷或青腫紫赤血痕疼痛不致內傷用蘇木煎汁磨降真香塗之忌見水塗數日漸愈以下俞增生半夏松香或煮或壓去油等分為末不拘金石木器及騾馬咬傷見血敷上即封口止痛墜撲損傷瘀血在內煩悶者用蒲黃末三錢溫酒調下本事方云蘇合香丸研化灌入即蘇半夏一錢八分大黃一錢冰片五釐共研敷之並治夾棍刀斧傷野薴根一兩搗碎好酒煎儘量飲醉青松毛陳酒糟等分搗爛敷患處治跌打損傷望江青一名天脂麻搗汁沖酒服渣罨傷處榆樹皮搗爛敷之亦妙十一月採野菊花連根葉陰乾每服一兩童便醇酒各一碗煎飲渣罨患處瀕死者可活神效無比跌墜毆壓馬踢刀箭諸傷雖腎子壓出者可治立能止血止痛並不忌風用白附子十二兩白芷天麻防風羌活生南星各一兩各研極細末就破處敷上傷重者黃酒浸服數錢青腫者水調敷之立愈價廉功大地方官須預配合如遇鬥歐傷者可全兩命跌打骨已斷者用十字路口來往多人出小便處磚一塊入火內燒紅再將童便一碗以紅磚投入便中再取磚燒紅又入便中如此九次將磚研細末每服五份生酒沖服酒儘量飲即效將磚預浸尿缸內數年可預煅備用市上乞兒破鞋底一隻燒灰飛羅面焙黃等分好醋調成糊敷患處以絹束之杉片夾定須臾止痛骨接有聲為效風仙花葉杵爛頻頻塗上白蘿蔔杵爛如泥敷患處裹緊過夜即差蜜和蔥白杵勻厚敷患處立效腦破者亦可用墜墮打撲扭閃出骸諸病用蠶砂綠豆粉炒黃各四兩枯礬二兩四錢共為末醋調敷之絹包縛定換三四次即愈產婦避之又張蘭渚中丞云晉人尚氣每有事甚細微一語不合輒即鬥歐刃傷較他省為多又不善於調治動致斃命今訪有秘方屢試屢驗神效異常特行刊發有牧民之責者亟須捐資慎選真實藥材如法制備一有報傷之案無論跌打損傷金刃他物骨折骨碎立即給藥照方醫治勿臥熱炕定有奇效州縣仁心為實遇有命案往往執罪惟輕之論不肯嚴辦然與其曲為開脫以致死者含冤何如速加拯救俾兩命俱得保全功德豈不更大乎方開於左十寶散冰片麝香各一分二釐辰砂乳香去油各一錢二分子紅花雄黃各四錢血竭一錢六分兒茶二分四釐歸尾二分四釐沒藥一錢四分共為細末貯瓷瓶黃蠟封口勿使泄氣一治跌打損傷皮肉青腫未破者用陳醋調敷患處腫消即愈一治刃傷並各器械傷皮破血出者以藥慘上包裹勿見風血止立愈一治內傷骨碎或骨已斷折先將骨節湊准以陳醋調藥厚敷患處用紙裹外加老棉絮包好再用薄板片夾護將繩慢慢捆緊不可移動藥性一到骨自接矣須靜養百日如犯房事必成殘疾一治刃傷深重未致透膜者先用桑皮線縫好多慘藥末於上以活雞皮急急貼護如前骨損養法一跌打昏迷不醒急用少許陳酒沖服自然醒轉即便調治此方神奇遇至重之傷鮮有不起死回生者開通元寶錢一枚燒而醋淬研末酒下能治折骨桃花散亦治跌損狗咬者用真麻油調敷墮車落馬筋骨疼痛用元胡索為末酒服二錢日二次救魘死臥室原有燈者則存本無燈者切不可點令人咬患者大拇指並腳後跟頻頻呼喚其名啐唾其面再灌以薑湯用生半夏末或皂角末或雄黃末或韭菜汁以入鼻孔或取梁塵如豆大納鼻中以艾灸人中穴並兩腳大拇指離指甲二三分搖動骨節處各三五壯有用烏骨雞冠血或雄鴨血滴口中青有用尿尿其面者有用竹筒吹其下部者聽其隨便用之救嚇死凡驚怖死者以溫酒灌之即活俞按薑汁蘇合丸皆可用救中惡屍喪邪氣古廟墳塚空房冷寓廢署荒園鬼神壇場祈禱詞社池沼苔蘚醞濕藤蘿樹木陰森一經感觸卒然昏迷名曰中惡急將病人移於宅內東方以醋炭薰之用薑湯化蘇合丸灌之或玉樞丹亦可再用蔥尖刺入病人耳內出血即活無血者重若大吐大瀉口鼻流血者最稱難治又視其上唇內沿有泡如粟米粒者以針挑破出血即活矣以下俞增又卒死暴疾及中惡客忤鬼打面青口噤奄忽氣絕用備急丸三粒溫酒或溫水化而灌之方用大黃乾薑巴豆霜各一兩為末蜜和搗千杵丸如小豆大也湯火傷湯泡火燙急覓水中大蚌放瓷盆中將其口向上少頃其口自開予備冰片麝香等分同研投入蚌內其口即合少頃蚌肉盡化為漿流於盆內用雞翎掃傷處即能止痛恐將愈之時毒水不幹即以蚌殼燒灰碾篩極細加冰麝少許慘之蓋以絹帛外加穰紙數層滲去毒水即瘳日服寧心敗毒之劑以除其煩無不奏效無蚌之處以柏油調杭粉掃之亦可或金汁亦可總不若用人之干糞燒灰麻油調茶為妙但人嫌穢汙多不肯用耳石灰一升入水數碗候灰化澄清以紙拖去水面浮油取灰水一杯再以香油一杯同入碗內攪數百遍即成糊漿用鵝翎掃患處即痛止腫消三四日自愈名清涼膏如皮肉已破者加豬毛燒灰生地熟地各切片燒炭等分研末調入清涼膏內搽之甚效以下俞增生大黃研末糝湯泡雞子清調塗火傷止痛無瘢龍眼殼洗去薑黃煅存性為末桐油調塗止痛無瘢生蘿蔔搗爛塗之莜麥麵炒焦油調塗極妙夏月收老南瓜瓤連水貯瓶內久而彌佳敷上即愈多年陳醬緩緩塗之甚良惟愈有黑疤秋葵花瓣以箸攫取浸麻油內塗上即效兼治濕火浸淫者鱉甲煅存性為末慘或用菜油調搽若皮膚臭爛者以蛇蛻燒存性為末麻油調搽二三次即愈火傷者若因痛用冰水浸則火毒入內不易治矣須用溫酒洗潑熱毒自出再以不化石灰研末不拘麻油菜油調勻塗之破爛者以杉木炭研末塗之最好以煮酒一二壇入缸中將患入浸入雖極重不死熱油澆傷白蜜塗之爆竹火沖眼令人以小便溺之即痛定徐用自己小便常洗自明金刃傷刀割傷者切勿見水用圖書粉石摻之滑石粉亦可大黃炒黑研末亦可或韭菜汁拌陳石灰陰乾研糝或用堅實細炭並老松香等分研篩細末以韭菜汁拌陰乾再研篩細末糝之苦急用不用韭汁拌亦可細辛黃柏等分研末敷以下俞增茶葉研末敷菸草研末敷之壁錢即欲名喜兒窠者敷貼即愈囊傷睪丸脫出者托上用此厚貼亦效鮮桑葉搗爛裹之冬月用桑根白皮亦可紅棗肉搗如泥封之口嚼燈心掩之立能止血龍眼核去光皮研細末糝瘡口即定痛止血並治磕跌傷愈後無瘢端午日收野苧麻葉陰乾曬燥搓熟取白絨收藏凡金刃傷者敷上止血且不作膿刀割斧砍夾剪槍箭諸傷獨殼大慄或土貝母或生半夏研末敷之止血收口斷指者以真蘇木為末敷之外以蠶繭包固中槍血出如箭原蠶蛾炒研末敷之立效治箭鏃不出陳年臘肉去皮骨搗爛再以象牙末人手指甲末各一錢均研極細同臘肉拌勻厚敷箭鏃四圍即出俞按或以螻蛄搗取汁滴上三五次即出象牙末水敷亦良凡銃炮鉛子入肉以水銀灌入傷處鉛子即化從水銀自患處流出中毒矢者煮蘆根汁飲三升或葛根汁亦可外以雄黃末敷之並納鹽臍中灸之竹本刺入肉者刮人手指甲末同紅棗肉搗爛塗之或嚼生栗子塗之瓷鋒嵌腳以三角銀杏仁去衣心菜油浸透搗餅貼之爛多年者四五貼必差並治針刺入肉日久而諸藥不效者以此油灌患處即出驗過俞增破傷鳳凡瘡癤潰爛並刀槍所傷最忌冒風染濕冒風者即角弓反張痰涎湧盛人事昏憒則為破傷風然傷有不同初則在表次則半表半裡再則竟入里矣證候不一方難預定而染濕者遍身腫痛昏不知人則為破傷濕可用白朮一兩酒二碗煎一碗熱服之如萬不能飲酒者以水煎亦可無論傷風傷濕二者最稱難治惟先用蝸牛搗爛塗其傷處內服之藥須明眼隨證施方被毆傷風致死在保辜限內者擬抵有一方可全二命以荊芥黃蠟魚鰾炒黃各五錢艾葉三片入無灰酒一碗重湯煮一炷香熱飲之汗出即愈惟百日內不可食雞以下俞增黑魚頭陰陽瓦上煆焦研末每三錢砂糖熱酒調服病人耳垢並刮其爪甲末唾調敷之新宰豬肉乘熱割片貼患處三易必愈蟬蛻研末蔥涎調敷破處即出惡水而平何首烏末敷之血止腫平白麵燒鹽各一撮研新汲水調塗鹽藏楊梅連核搗如呢捏成錠子以竹筒收之凡遇破傷研末敷之止血生肌無瘢甚效玉真散最為妙劑可敷可服不但去風亦能去濕屢試屢效按南星真妙品也癰毒瘰癧眼疱痰核均研末醋調磕傷打傷臁瘡爛足之腫合黃丹石膏皆可參用蔣附救諸蟲咬人咬即用熱尿洗去牙黃瘀血以蟾酥丸塗入孔內或嚼生栗子塗之如腫痛用麻油紙然火焰薰之或用幹人糞裝荔枝殼內安放患處加艾團灸之以不痛為度蚌肉敷患處亦效以下俞增豆腐店內架上淋下積成漿垢刮下敷之甚效虎咬爪傷蠶豆葉搗敷無葉時以干蠶豆水浸軟連皮搗敷俞增猴爪傷金毛狗脊焙研末糝之或麻油調搽俞增馬咬雞冠血塗之牝馬雄雞牡馬雌雞俞增豬咬龜板燒研香油調搽俞增瘋狗咬即猘犬也瘋狗者乃朝夕露臥為四時不正之氣所侵陰陽肅殺之氣所感舌出流涎頭低耳垂目赤尾拖急走無定多見於春未夏初之交亦曰癲狗亦曰癲狗人被咬傷即煩躁口乾小便澀痛最稱難治其人頂中必有紅髮數莖急須拔去輕者用天南星防風為末各一錢五分以酒調服重者用斑蝥五個去頭尾足翅以糯米一合同炒黃色去米將蝥為末酒一盞煎半盞空心溫服從小便中下去惡物如小狗狀必待皮色清白方為毒盡如毒未盡須再服之咬處輕者以生栗子嚼敷或紫蘇葉嚼敷重則必用男人熱糞敷之冷即更換待大勢平定則用幹人糞燒灰麻油調敷俞按毛達可云瘋狗咬者最怕七日一發發時形狀天本無風病者但覺風大要入幔矇頭躲避此非吉兆過三七之日無此畏風情形方為可治如被咬時即於無風處以冷水洗淨齒垢塗以杏仁泥即服韭菜汁一碗隔七日再服一年忌狗肉蠶蛹終身方得保全否則十有九死徐木齋謂此方親見有效若服斑蝥以致小便疼痛俗云產小狗此等無稽之談萬不可信欲解斑蝥毒以冷水調六一散三錢服三次痛止而愈常犬咬者亦須洗去牙垢擠盡惡血研桑樹自然汁塗之蠶豆葉搗爛罨之杏仁嚼爛敷之大蒜衣燒灰菜油調敷再以大蒜衣貼灰上柿餅嚼爛封之白沙糖同大蔥白搗塗蛇咬藍葉搗汁調雄黃末敷之或用雄黃生礬勺內溶化以箸頭蘸藥點患處冷則易之連點七次或搗黃豆葉敷之若毒走腫痛者以麻油焰薰之再用玉樞丹一錢酒磨服之取汗或用半枝蓮搗爛取汁三兩熱酒四兩和服取汗渣塗患處更妙或用陰乾蒼耳草五錢水煎一碗熱服取汗人糞厚塗傷處牛糞亦可用以下俞增搗大蒜和胡粉敷之扁豆葉杵爛絞汁酒沖服渣敷患處冬間以燥葉酒煎服亦可明礬麝香共研末糝上以艾灸之即愈金絲荷葉草打汁塗之劈煙管取其中煙膏塗傷處菸葉末敷之亦可咬傷看傷處有竅是雄蛇無竅是雌蛇以針挑破傷處成竅然後以野苧麻嫩頭搗汁和酒服三盞絞渣敷瘡口毒自竅中出立愈將渣棄水中永不再發急飲麻油一碗免毒攻心再用土貝母四五錢研末熱酒和服再飲酒盡醉安臥少時酒化為水從傷處噴出候水盡以渣敷瘡口垂死可汗萬年青搗塗之鮮梧桐葉嚼爛塗亦良毒蛇咬傷急以利刀割去死肉為要若傷在手足用繩絹札定勿使毒氣蔓延至入心腹再令人口含米醋或燒酒吮傷處吸去其毒隨吮隨吐隨換酒醋再吮以紅淡腫消為度吮者不可誤咽入腹內以致中毒患者急飲麻油一二杯護心解毒五靈脂一兩雄黃五錢酒煎服渣塗咬處白荷花須曬研末酒調服一錢再以絲瓜藤汁調搽患處蜈蚣咬雞冠血塗之梳篦上頭垢塗之又蜘蛛一個安患處使吸其毒吸完擲蜘蛛於水內吐出毒氣蜘蛛仍活舊竹箸火中將頭燒黑取下少許研細敷患處立愈俞增蜒蝣塗之立效煙油塗之亦妙壁虎咬壁虎即蠍虎也一名守宮被咬者以青苔塗擦再用敗毒之劑加青苔三錢煎服俞按刺毛螫者以伏龍肝酸醋捏成團在痛處搓轉其毛皆出最妙百蟲入耳宜閉口勿言以紙塞耳只留蟲入之耳用麻油滴竅內或出或死如娛蚣蜜蜂大蟲入耳以肉炙香安耳邊蟲聞香自出或用貓溺滴入耳即出取貓溺以生薑擦鼻即溺如蟲夜間暗入者切勿驚慌叫喊逼蟲內攻宜正坐點燈光向耳竅其蟲見光即出對面有人其中不出或以桃葉作枕一夕自出雄黃研水灌之以下俞增斷腸草毒一名野葛一名雷公藤俗名菜蟲藥用雞抱雛卵擘破以清油調勻灌之或服生雞子二三枚或服熱羊血碗許總宜吐盡方蘇誤吞水蛭水蛭一名螞蟥用田中泥或山黃泥丸梧子大每服二三錢空心開水送下隨泥解出而愈或用蜜半杯調水服亦可俞按誤吞蜈蚣者熱雞血灌之即出或用生雞子調勻沖酒服服後再用生大黃末和香油飲之頃刻瀉出燒酒醉死解散其發浸於新汲井水內用熱豆腐切片遍身貼之冷即更換再煎葛根湯飲之或取鍋蓋上氣汗水三杯徐徐服之醒後宜飲清綠豆湯火薰悶絕狼煙煤炭毒生蘆菔搗汁灌之重者以熱溺灌之喉蛾輕者用杜牛膝根搗汁加人乳些許令病人仰臥滴鼻孔內一二匙不可嚥下隨即起來吐去痰涎即愈重者用杜牛膝根汁入醋漱喉吐出痰涎立愈喉痹音秘用真鬱金一錢巴豆霜三分明雄黃二錢共為細末水調為丸如芥子大每服十二丸用熟水些許送下即開遲則難效俞按初起用食鹽自搓手心鹽干再易新鹽片時即消又極效方斷燈心數莖纏指甲就火薰灼俟黃燥將二物研細更用火煏臭蟲十個一併搗入為末以銀管吹之青魚膽臘月收掛風乾以少許放舌上含化立效萬年青根水煎滴醋少許服之巴豆一粒研碎或布或絹包好左蛾塞右耳右蛾塞左耳如雙蛾用巴豆二粒左右並塞一刻頭頂有泡挑破即愈淨毛豬尾一莖煮一滾取其不硬不軟徐徐插入喉內觸破脹大蛾吐出膿血再服解毒藥此急救妙法芒硝研細一錢五分膽礬雄黃明礬各八分俱研極細和勻吹之火硝一錢五分官蓬砂五分冰片三釐共研細和勻鵝管蘆管銀管俱可吹入即吐痰涎而愈亦可從鼻孔吹入喉閉以鴨嘴膽礬研細釅醋調下吐出膠痰即愈或以牙皂搗爛醋調灌入四五匙痰亦即吐又方紫金片一錢薄荷湯磨緩緩灌下即愈又方巴豆七粒去油用紙包裹縛眉心上即開又方白礬末五分烏雞子一個同調勻灌入即效甚驗又明礬二錢溶化入巴豆仁七粒燒至礬枯去巴豆研細吹入即流涎而開又雄黃芒硝各一錢研細以鵝管吹之數吹即散咽喉戳傷不能飲食者雞子一個鑽一小孔去黃留白入生半夏一個入微火煨熟以蛋白服之立愈牙疳走馬牙疳若無故起者多由於膏粱厚味所致亦有起自痧痘毒盛或傷寒熱壅未經清解火積於胃涎流口臭牙齦腐爛甚至齒落者急吹此藥於患處再服清胃湯加黃連蘆薈遲則難救若腮穿皮破者更難救矣吹藥用人中白五錢煅陳蠶繭二錢五分煅存性五倍子一錢打碎囫圇五倍子一錢裝入明礬一錢煅枯川黃連末五分蘆薈末五分真牛黃三分青黛五分冰片四分陳壁錢窠十七個煅存性共研細末先用河蚌煮湯漱口後以此吹患處俞按此證亦有因多服溫補藥而致者霍亂凡人傷暑腿肚轉筋者名暑霍亂傷寒腿肚轉筋者名寒霍亂傷食腿肚轉筋者名食霍亂皆上吐下瀉雖稱危急究是邪從吐瀉而出尚屬可治獨有氣機閉塞不吐不瀉轉筋入腹痛不可言名乾霍亂若衝至心不可救矣速用木瓜吳茱萸各一錢食鹽五分水二盅煎一盅服之即愈俞按霍亂轉筋一證既有寒暑之分亦有暑伏於內而寒束於外者故服藥最宜審慎干雀亂俗名絞腸痧固由氣閉使然亦有見轉筋者史君所主之方洵為妙劑若轉筋入腹多屬下元虛弱之人寒暑雜受深入陰經宜用倭硫黃肉桂母丁香吳茱萸各一錢麝香當門子三分各研極細和勻密貯小瓷瓶內每用二三分以蔥汁調置臍中外以膏藥封之一時即愈即吐瀉太多而元氣欲脫者亦可貼以回陽因名曰回陽膏若內治之法既猝難分別證候之囚寒因暑況多利亡陰血液已奪雖可投熱藥者亦恐剛烈劫陰終於不救此方藥雖猛峻而僅取其氣由臍入腹自能溫通臟腑以逐寒邪不致傷陰誠為善策但近年此證甚多倉淬之間惟恐製藥不及願將此方廣為傳播冀有力之家預行修合以應危急之需則造福無涯矣然藥味猛烈止宜外治斷不可吃懷孕者並不可貼也又三聖丹木香一兩不見火雄黃二兩明礬三兩共研細末用鮮荷葉橘葉藿香葉各二兩搗汁丸如梧子大每服九分治寒濕霍亂如神重者再服又生芋芳治絞腸痧甚效患此者食之味美垂危可救乾霍亂者俗名烏痧脹人多不識但北方患此者甚少獨南方婦女及莊村農人略染風寒暑濕之邪則必刮痧一刮即愈其應如響遂成慣病此亦風土習俗竟為醫藥捷徑凡鄉嫗老溫是其手段用齏湯一碗或白水入香油數匙亦可以麻蘸之所刮之處乃胸脊兩臂彎兩膝彎眉攢頸下等部所見之色有紫紅黃黑之分飢飽寒熱之別重者必刺去惡血而後可人若四肢無力胸腹悶痛凜寒困倦眩暈嘔惡者此即痧之將發也宜速刮之遲則氣機壅塞而竟有脹死者余亦未解其故也俞按痧脹有兼腹痛者乾霍亂則腹痛如絞證有分別病源則一也然須分別論治矣郭右陶著痧脹玉衡一書論之甚詳若急痧欲死之證須將病人之口撐開看其舌底有黑筋三股男左女右以竹著嵌碎瓷鋒刺出惡血一點即愈鼓脹其證有二因虛寒所致者金匱腎氣丸主之濕熱所致者用雞矢白炒沉香色研篩細末一升盛瓷瓶內浸好酒二斤密封煮三炷香定清隨意頓溫服之或用真黃牛肉一斤以河水煮極爛加皮硝一兩隨意食之二三日其腫自消至重者再一服則愈矣百日之內忌酸鹽生冷麵食葷腥油膩黏硬之物雄按牛肉皮硝消補並用之妙法也楊素園大令嘗云昔年治一腫證始用溫補而右半之病已愈繼用芒硝三錢而左始消與此晴合氣虛中滿用米鋪中破巴斗去竹邊將柳條連糠垢炙灰每日送服一湯瓢服三具即安以下俞增氣鼓用陳年大麥須水煎湯服泄氣即消又方陳香櫞四兩去瓤人中白三兩共為細末每一錢開水空心服忌鹽百日甚效石菖蒲一斤為末每二錢白湯下活烏背鯽魚一尾愈大愈佳再用獨核肥皂一個去子同前魚搗爛圍貼臍上臍雖平而有紋影者其氣自入輕者貼一二日重者貼三五日才應氣蠱下泄水蠱血蠱下瀉即愈水腫以草屋上陳年稻草煎湯傾盆內先薰俟溫沃其腹小便隨下黃水二三次即愈不復發又隔年西瓜一個生芽滿腹者佳將瓜切去蓋用大蒜數十個去衣裝入瓜內仍蓋好鹽泥封固掘土深一尺將瓜埋於土內離土二三寸上用炭火燒一晝夜取出去火氣以大蒜與病人食完即愈綠豆煎湯洗浴並治黃疸甚效又西瓜一個開蓋挖去子瓤加雞內金不落水者四具入瓜內蓋好瓜外遍塗爛泥放瓦上炙存性去泥研末每服一錢少加黃糖拌之開水調服又幹絲瓜一條去皮剪碎入巴豆十四粒同炒以巴豆黃色為度去巴豆用絲瓜與陳倉米同炒米如絲瓜之多候米黃色去絲瓜研米為末水法丸如梧子大每百丸開水下此元時杭州名醫宋會之方也宋言巴豆逐水絲瓜象人之脈絡去而不用藉其氣以引之米則養胃以補正培土而勝水也又有食積停痰而腫者以蟾蜍一隻納胡椒一錢於其口內外包洗淨豬肚一具縫好煮爛丸服小水不通新象牙末一錢河水煎湯下立效俞按此方我服可愈痔瘻以象牙能消管也又向日葵根一兩白酒煎湯服外用蔥三斤切炒熱分兩包互熨少腹又麝香五釐牙皂末一分研勻唾調塗溺孔上再搐鼻取嚏即通又大山螺一個鮮車前草一握無則以大蒜代之搗爛加麝香二三分貼臍下水分穴以帛束之通即解去尿梗病以甘蔗青稍葉一兩生酒煎服瘍科雄按徐靈胎所批外科正宗瘍科選粹等書習瘍醫者皆宜究心也癰疽宜灸疔毒宜針明疔易治暗疔難療生於口耳眉目顴鼻者顯而易見生於身體四肢者隱而難察及至發作每易混作傷寒半日不治毒必走黃入心人即昏瞀若知覺早者急用鈹針或瓷鋒刺入二三分許擠去惡血當插立馬回疔丹於針孔之內恐此丹猝不能得可用蝸牛連殼搗爛敷之或家菊花根葉搗爛敷之俱內服梅花點舌丹或蟾酥丸一二服用菊花根葉汁和熱酒送下出汗即愈屢見患者怕痛拒針殊不知一染疔毒皮肉即僵雖針不覺其疼須放膽速針切勿遲延而誤時刻也雄按徐靈胎曰癰疽陽毒及生頭面者忌灸疔瘡忌鐵必用金針或銀針為穩立消疔瘡膏松香以桑柴炭煎汁澄清入松香煮爛取出納冷水中少時再入灰水內煮以色白如玉為度二十兩白蠟二兩切為粗末黃蠟十兩刮為粗片明乳香三兩研極細末沒藥三兩研極細末銅綠五兩研細過絹篩再研至無聲為度百草霜先將刮淨鍋底專燒茅柴百草取煙煤如以別種柴煙煤用入則不驗研細過絹篩再研至無聲為度五兩麻油六兩先選吉日擇淨室焚香齋戒虔誠修合忌婦人雞犬及孝服人見用桑柴火將麻油煎滾次下松香候稍滾三下白蠟候稍滾四下黃蠟候稍滾五下乳香候稍滾六下沒藥候稍滾七下銅綠候稍滾八下百草霜滾過數次於鍋內冷透搓成條子丸如龍眼核大貯淨瓷瓶內用時以一丸放水壺上頓軟捻扁貼患處頃刻止痛次日腫消即愈已走黃者亦可回生貼後忌葷腥辛辣沸湯大熱食生冷發物麵食豆腐茄子黃瓜酒忌水洗忌惱怒憂悶房事以下俞增又方生礬二錢研極細末用軟腐皮裹好蔥頭湯吞下即愈兼治發背魚口無名腫毒又活蜒蝣數十個洗去浮黏用清水一併吞下三服即愈又甘菊花連根葉搗爛熱酒沖服渣敷患處亦解牛肉毒指頭疔宜先刺破用豬膽一枚剪去膽柄傾去膽汁一半加雄黃末二分蜈蚣炙末一分黃靈三仙丹五分共研勻入膽內攪勻套指紮根數日即愈翻唇疔多至七個者名七星趕月頭腫如斗以蛔蟲搗爛塗之頃刻瘡口流黃水而愈如無蛔蟲以五穀蟲暵末一錢白礬三分蟾蜍三分酒化烊共調塗即流黃水而安凡唇疔即看大腿彎有紫筋起者急用銀針刺出血愈諸疔以蟾蜍舌一個研爛蟾皮蓋貼其根即拔雄黃末一錢烏梅肉三枚蜒蝣二條共搗爛塗疔即拔出老南瓜蒂數個焙研為末麻油調塗露頂灶上蟑螂杵爛敷之其根立拔亦可酒和內服紅絲療諸腫毒皆治螃鮍魚一個杵爛塗之疔即出諸疔誤食豬肉走黃法在不治急搗芭蕉根汁服之立效誤食羊肉者濃煎栗子殼湯飲紅絲疔走臂直上用食鹽少許從上擦下待浮膚微損紅絲旁散即愈或更以小溲灌之尤妙蔣附治驗痔瘡痛楚難忍者用梓銅樹枝葉煎湯洗之或豨薟草連根煎湯洗雄按徐洄溪曰此證切忌刀針砒硇線墜及三品一條槍等藥誤用多致傷生戒之麒麟菜一兩洗淨天泉水煮烊加白糖食之以下俞增莜麥面以豬膽汁丸如綠豆大吞服以愈為度極驗每日淡生荸薺三個淡腐漿送常以柿餅湯代茶兼能愈噎膈絲瓜絡瓦上炙存性研末加冰片少許麻油調搽韭菜不拘多少先用盆盛熱湯盆用有孔木蓋一個投韭菜於湯中即以肛門坐對蓋孔令熱氣薰之候溫用水洗瘡不數次腫消血止爛石榴四個皮硝五錢地骨皮烏梅槐花各一兩煎湯薰洗翻花痔木瓜研末鱔魚身上黏涎調塗以紙護之痔瘻草本水楊柳根煎洗有蟲出即愈又萬年青葉搗汁搽又棉花子仁烏梅肉各六兩共杵爛丸梧子大早晚三錢開水下喚痔去痔神方如痔生肛內以草烏研末唾調搽肛門痔即翻出向外乃用花蜘蛛絲纏定一時辰後略覺脹急亦好忍不甚疼少頃反覺輕鬆卻用大黑蜘蛛於瓶中煅枯為末唾津調搽漸覺作癢以熟湯洗之再搽則癢定矣如此七日痔枯無患對口未成時內服蟾蜍丸外用荔枝肉搗爛熬膏敷之或調雞糞同極細胡椒末入蜜些許調敷或桑根白皮加桐油搗爛敷之俱要不時更換使藥力內達即可消矣鮮茄蒂七個鮮何首烏輕重等分水二盅煎八分一服出膿再服收口以下俞增對口一名梟宜俗名落頭疽用青蔗渣白狗矢焙燥為末和勻將竹管一個稀絹包竹管頭入藥篩膏藥上貼之垂死可活活全鯽魚一尾帶鱗腸胃加山藥二三兩同搗如泥敷即漸消鱔魚四五斤置小盆內以白糖霜糝魚上則魚身之涎流聚一處取而塗之隨塗隨小而愈象貝母研末敷立效發背膏藥一方余得之甚難不惟去其資斧而禮下於人者至再設法購求方能得之及合藥送人無不取效今刊布廣傳倘有同志修合濟人乃余苦心求方之幸也滴乳香箬包燒紅磚壓去油四兩淨沒藥制同上四兩白色兒茶上好銀硃鮮紅血竭杭州定粉上好黃丹各四兩上好銅綠三錢以上俱各碾至無聲篩極細末和勻瓷瓶密貯臨用照患之大小用夾連四油紙一塊以針多刺小孔每張以藥末五錢真麻油調攤紙上再用油紙一塊蓋上周圍用線將二紙合縫一處貼患上即止痛化腐生新過三日將膏揭開濃煎蔥湯將患上洗淨軟絹拭乾將膏藥翻個用針照前刺小孔貼之因藥品甚貴取其又得一面之藥力也無火之人內服十全大補湯有火之人減去肉桂薑棗兼以飲食滋補無不取效至重者用膏兩張百無一失發背初起用生白礬三錢大黑棗四枚去核同打為丸如桐子大每服二錢好酒下以下俞增又五倍子末二兩藤黃二錢五分研細末醋調圍之一切腫毒皆治又龜板一味去肋塗黃蠟炙透內服外敷有奇效背疽惡瘡收口長肉用青蔗渣曬燥煅存性研極細以小竹管如瘡口大者一個稀絹包其頭作篩藥末填滿瘡孔膏藥蓋之背癰及一切大毒用大蟾蜍一個剝取全身之皮針刺數孔將皮之外面向患處貼之大能拔出毒氣且包住瘡口不令長大指頭疔亦可包而瘰癧潰後口不斂者及痘後回毒亦著奇功但切記不可將皮裡面著肉恐咬牢不可揭也濕痰流注初起疼痛漫腫無頭皮色不變久而不治則發熱作膿潰爛成漏知覺早者於未破頭時急服此藥十餘劑即能內消醫治多人最稱靈驗不信服者縱有他藥無出其右若虛弱之人誤用行藥元氣一虧更難醫治方用土茯苓瓷鋒刮去皮木棒打碎四兩真膽星橘紅秦艽防風各二錢真川貝殭蠶炒去絲淨銀花槐花炒五倍子研碎各三錢木通一錢防己八分白甘遂刮去皮碎末七分鮮皂角子打碎九個鮮肥皂子打碎十個體虛者加石斛二錢薏仁三錢患在頭項胸者加夏枯草二錢在脊背者加羌活五分在脅肋者加柴胡五分在肚腹者加赤芍二錢澤瀉一錢在臂者加獨活五分在腿足者加木瓜二錢牛膝一錢五分每劑用河水九碗砂鍋內煎至去渣三碗每日早中晚各熱飲一碗虛弱人一劑分為二劑極虛人分為三劑小兒分為四劑忌食鹽醬茶醋豬肉魚腥雞鵝雞子一切發物煎炒姜椒菸酒生冷再方中有白甘遂與甘草相反恐別樣丸散內有甘草者切不可犯凡已破頭者止服此方四五劑使氣血調活不致流串他處隨服十全大補湯加川貝一錢五分石斛二錢飛過滴乳香四分須服數十劑方能全愈若素屬多火之人大補湯內減去薑桂勿用俞按此證俗呼流注串毒而不知因痰濕入絡所致外科皆不善治者此也毛達可先生極推控涎丹之功亦取其有走絡滌痰之甘遂等藥也與史君此法若合符節而煎劑尤易見效矣黴瘡治不得法不但一身為害而且殃及妻兒甚有不嗣之虞其治法各有不同有遏抑其毒而不令其出者有重用行藥而行去其毒者有用升生之劑而發出其毒者有用解脫之藥而敗去其毒者四者之中惟升生解托可從至於遇抑不出將來必至結毒重用行藥熱必大傷元氣余有一方藥止數味既非行抑更覺平和且無論新久不二十劑而能收功不獨永除後患亦得無礙生育但恐收功之後視為容易又恐恣情縱欲豈非助紂為虐是誰之過歟依我狂言當痛改前非力行善事挽天地之惡絕保父母之遺體免自己之罪孽培子孫之福壽所得不益多乎方用當歸五錢淨銀花防風荊芥何首烏各三錢肥皂子打碎九個土茯苓瓷鋒刮去皮木棒打碎四兩豬胰一具右以河水六碗砂銚內煎至三碗每早中晚各食遠溫服一碗忌鹽醬醋茶雞魚鵝鴨蝦蛋鮮物葷則止宜土茯苓煨豬肉素則止宜白菜及豆腐他物皆有所忌茶則以土茯苓湯代之又方豬胰土茯苓各二兩芭蕉根一兩雪裡紅五錢銀花五加皮各二錢皂角刺木爪蟬蛻白蘚皮各一錢炙殭蠶七分皂莢子打碎獨核肥皂仁切片各七粒水三大碗煎一碗飢時服年久力衰者加薏仁五錢綿黃耆三錢甘草節懷生地西洋參各二錢久不愈加胡黃連三錢胡麻仁二錢全蠍七個以下俞增又方棉花子仁研如泥入研細生槐花末和丸如綠豆大每四錢空心及午後吞結毒方用拘木一名十大功勞一名貓兒殘黑子者是紅子者名樞木亦可用取其葉泡湯或為末不住服兼治積年虛勞痰火且能健脾進食結毒喉爛蒂舌落上齶穿破用極大蝸牛殼五個兒茶二錢活松樹皮煅存性勿沾灰塵二錢冰片七分各研細粉和勻吹之名咽喉至寶丹
