front:
  text: 序舅氏俞公桂庭不業醫而喜讀軒歧之書捐館後雄於遺篋中檢得願體醫話一卷繹之皆時醫藥石之言多急救全生之法惜其簡略疑非完書度而藏之者二十年矣前年許子領三以搢臣先生原稿持贈乃知本無殘闕先舅氏僅刪陰證一條尤為有識增補諸方亦皆精妙夫肘後雞峰世人罕讀病來倉卒醫輒茫然近惟種福堂選方養生經驗二書最稱善本海內風行茲編呈簡頗有補二書所未及者胡敢秘耶爰付攻木之工以公於世憶昔在婺舅氏嘗遺書訓雄曰凡病治愈須存底稿雄遵而行之迨癸卯冬故人周君光遠選刻拙案二卷曰回春錄甲辰之案張封翁信堂題曰仁術志至庚戌踵成八卷今春楊大令素園重為刪定詳加評點慨捐鶴俸合梓於宜黃縣署總題曰王氏醫案凡十卷而舅氏皆不及見且雄才識疏庸不能深造將何以慰曩時之屬望耶校此遺編能無於邑咸豐紀元辛亥閏月王士雄謹識於潛齋
  hash: sha256:f180935f184ef95507bd261107e44fe82b39ab94b71b86fd213b7304523b1a15
